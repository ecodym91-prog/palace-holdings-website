<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a href="index.html" class="header-logo">
    <img src="assets/images/企業ロゴ_透過_文字ネイビー.png" alt="PALACE HOLDINGS" onerror="this.style.display='none'">
  </a>
  <button class="nav-toggle" id="navToggle" aria-label="メニュー"><span></span><span></span><span></span></button>
  <nav>
    <ul>
      <li><a href="index.html">Top</a></li>
      <li><a href="service.html">Service</a></li>
      <li><a href="flow.html">Flow</a></li>
      <li><a href="flow.html">Flow</a>
      <a href="company.html">Company</a></li>
      <li><a href="guideline.html">Guideline</a></li>
    </ul>
  </nav>
</header>

<div class="page-hero">
  <span class="page-hero-label">Contact</span>
  <h1 class="page-hero-title">お問い合わせ</h1>
</div>

<section class="section contact-section">
  <div class="section-inner">
    <div class="section-header center" style="margin-bottom:48px;">
      <p class="section-lead" style="margin:0 auto;">ご相談は無料です。秘密は厳守いたします。<br>お気軽にお問い合わせください。</p>
    </div>
    <div class="contact-form-wrap">
      <form action="#" method="post">
        <div class="form-group">
          <label class="form-label">お名前<span class="required">必須</span></label>
          <input type="text" class="form-input" placeholder="山田 太郎" required>
        </div>
        <div class="form-group">
          <label class="form-label">会社名</label>
          <input type="text" class="form-input" placeholder="株式会社〇〇">
        </div>
        <div class="form-group">
          <label class="form-label">メールアドレス<span class="required">必須</span></label>
          <input type="email" class="form-input" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">電話番号</label>
          <input type="tel" class="form-input" placeholder="03-0000-0000">
        </div>
        <div class="form-group">
          <label class="form-label">お問い合わせ種別<span class="required">必須</span></label>
          <select class="form-select" required>
            <option value="">選択してください</option>
            <option value="sell">譲渡をご検討の方</option>
            <option value="buy">譲受をご検討の方</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">お問い合わせ内容<span class="required">必須</span></label>
          <textarea class="form-textarea" placeholder="ご相談内容をご記入ください。" required></textarea>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;">
            <input type="checkbox" required>
            <a href="privacy.html" style="color:var(--navy);text-decoration:underline;">プライバシーポリシー</a>に同意する
          </label>
        </div>
        <div class="form-submit">
          <button type="submit" class="btn btn-gold">送信する</button>
        </div>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">
      <img src="assets/images/企業ロゴ_透過_文字白.png" alt="PALACE HOLDINGS" style="height:90px;width:auto;">
    </div>
    <nav class="footer-nav">
      <a href="service.html">Service</a>
      <a href="flow.html">Flow</a>
      <a href="company.html">Company</a>
      <a href="guideline.html">Guideline</a>
    </nav>
    <div class="footer-copy">© 2026 PALACE HOLDINGS, INC. All Rights Reserved.</div>
  </div>
</footer>

<script>
  document.getElementById("navToggle").addEventListener("click",function(){
    document.querySelector("nav").classList.toggle("open");
  });
</script>
</body>
</html>
